name: Generate How-To Docs
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        # Uses the latest stable version (v4)
        uses: actions/checkout@v4 

      - name: Set up Python
        # Uses the latest stable version (v5)
        uses: actions/setup-python@v5 
        with:
          python-version: '3.10'

      - name: Run Logic Extraction Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # This automatically gets the PR number from the GitHub event
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          pip install PyGithub google-genai
          python scripts/extract_logic.py
