name: Logic Extractor
on:
  pull_request:
    types: [opened, synchronize] # Runs when PR is created or updated

jobs:
  run-logic-extraction:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # Required to post the comment
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install PyGithub google-genai

      - name: Execute Extraction
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Provided by GitHub automatically
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: python scripts/extract_logic.py
