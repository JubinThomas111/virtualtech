name: AI Documentation Pipeline
on: [push, pull_request, workflow_dispatch]

jobs:
  generate-docs:
    runs-on: ubuntu-latest
    # Explicitly granting permissions to ensure the token can post comments
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Necessary for the AI to see the full code diff

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install --upgrade google-genai PyGithub

      - name: Run AI Documentation Script
        env:
          # MAPPING: This connects your secret 'GH_TOKEN' to the script's variable
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # Context variables for the script logic
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
        run: python scripts/extract_logic.py
