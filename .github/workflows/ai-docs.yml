name: AI Documentation Pipeline
on: [push, pull_request, workflow_dispatch]

jobs:
  generate-docs:
    runs-on: ubuntu-latest
    
    # 1. SECURITY: Granting 'Write' permissions to post comments
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      # 2. SETUP: Get the code and the Python environment
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # AI needs full history to see code diffs

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # 3. DEPENDENCIES: Install the latest stable SDKs
      - name: Install Dependencies
        run: pip install --upgrade google-genai PyGithub

      # 4. EXECUTION: Run the clean-slate script
      - name: Run AI Documentation Script
        env:
          # MAPPING: Connecting your 'GH_TOKEN' secret to the script's variable
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # CONTEXT: Passing metadata for the AI to find the PR/Commit
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
        run: python scripts/extract_logic.py
