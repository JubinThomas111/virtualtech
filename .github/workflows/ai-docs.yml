name: 🚀 PROD: AI Documentation
on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

jobs:
  generate-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: pip install PyGithub google-genai
        
      - name: Run AI Script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # This is the most reliable way to get the PR number in 2026
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.number }}
        run: python scripts/extract_logic.py
