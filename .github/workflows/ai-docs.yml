name: AI Documentation Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch: # Allows manual triggering for testing

jobs:
  generate-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install google-genai PyGithub

      - name: Run_AI
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          # DYNAMIC: Checks for PR number, then the event issue number
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
          # NEW: Provides the Commit SHA if there is no PR (for Merges)
          COMMIT_SHA: ${{ github.sha }}
        run: python scripts/extract_logic.py
